<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Chat bubble container -->
  <rect x="340" y="120" width="520" height="340" rx="24" fill="rgba(124,140,255,0.08)" stroke="rgba(124,140,255,0.2)" stroke-width="1.5"/>
  <!-- Chat lines inside bubble -->
  <rect x="390" y="170" width="280" height="14" rx="7" fill="rgba(255,255,255,0.15)"/>
  <rect x="390" y="198" width="220" height="14" rx="7" fill="rgba(255,255,255,0.1)"/>
  <rect x="390" y="226" width="300" height="14" rx="7" fill="rgba(255,255,255,0.1)"/>
  <!-- Ad placement indicator -->
  <rect x="390" y="270" width="420" height="100" rx="12" fill="rgba(124,140,255,0.12)" stroke="rgba(124,140,255,0.3)" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Ad label -->
  <rect x="410" y="285" width="42" height="18" rx="4" fill="rgba(124,140,255,0.3)"/>
  <text x="431" y="298" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">AD</text>
  <!-- Ad content lines -->
  <rect x="410" y="316" width="180" height="10" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="410" y="336" width="140" height="10" rx="4" fill="rgba(255,255,255,0.08)"/>
  <!-- CTA button in ad -->
  <rect x="700" y="314" width="80" height="28" rx="6" fill="rgba(124,140,255,0.25)"/>
  <text x="740" y="332" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">Learn More</text>
  <!-- More chat lines after ad -->
  <rect x="390" y="400" width="260" height="14" rx="7" fill="rgba(255,255,255,0.1)"/>
  <rect x="390" y="428" width="200" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
  <!-- Cursor blinking indicator -->
  <rect x="390" y="428" width="2" height="14" rx="1" fill="rgba(124,140,255,0.6)"/>
  <!-- Floating data points around the bubble -->
  <circle cx="220" cy="200" r="4" fill="rgba(124,140,255,0.3)"/>
  <circle cx="180" cy="320" r="3" fill="rgba(124,140,255,0.2)"/>
  <circle cx="260" cy="400" r="5" fill="rgba(124,140,255,0.15)"/>
  <circle cx="980" cy="180" r="4" fill="rgba(124,140,255,0.25)"/>
  <circle cx="1020" cy="300" r="3" fill="rgba(124,140,255,0.2)"/>
  <circle cx="950" cy="420" r="5" fill="rgba(124,140,255,0.15)"/>
  <!-- Watermark -->
  <text x="600" y="560" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2">AI MARKET LAB</text>
</svg>
