<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="300" fill="url(#glow)"/>
  <!-- Central Meta-style infinity/orbit -->
  <ellipse cx="600" cy="315" rx="200" ry="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" transform="rotate(-30 600 315)"/>
  <ellipse cx="600" cy="315" rx="200" ry="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" transform="rotate(30 600 315)"/>
  <ellipse cx="600" cy="315" rx="200" ry="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Center core -->
  <circle cx="600" cy="315" r="40" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="600" cy="315" r="20" fill="rgba(129,140,248,0.5)"/>
  <!-- Orbiting nodes -->
  <circle cx="400" cy="315" r="14" fill="rgba(255,255,255,0.3)"/>
  <circle cx="800" cy="315" r="14" fill="rgba(255,255,255,0.3)"/>
  <circle cx="500" cy="200" r="10" fill="rgba(255,255,255,0.2)"/>
  <circle cx="700" cy="430" r="10" fill="rgba(255,255,255,0.2)"/>
  <circle cx="700" cy="200" r="10" fill="rgba(255,255,255,0.2)"/>
  <circle cx="500" cy="430" r="10" fill="rgba(255,255,255,0.2)"/>
  <!-- Scattered particles -->
  <circle cx="250" cy="180" r="3" fill="white" opacity="0.3"/>
  <circle cx="950" cy="150" r="4" fill="white" opacity="0.2"/>
  <circle cx="180" cy="450" r="3" fill="white" opacity="0.25"/>
  <circle cx="1020" cy="480" r="3" fill="white" opacity="0.2"/>
  <text x="600" y="70" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">AI MARKETING LAB</text>
</svg>
