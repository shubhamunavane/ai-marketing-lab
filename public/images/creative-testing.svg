  <rect x="380" y="440" width="80" height="30" rx="6" fill="rgba(52,211,153,0.3)"/>
  <text x="420" y="460" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">92%</text>
  <!-- Card B -->
  <rect x="660" y="140" width="420" height="350" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <rect x="680" y="160" width="380" height="200" rx="10" fill="rgba(255,255,255,0.08)"/>
  <circle cx="870" cy="260" r="30" fill="rgba(255,255,255,0.15)"/>
