      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- A/B Test cards -->
  <!-- Card A -->
  <rect x="120" y="140" width="420" height="350" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <rect x="140" y="160" width="380" height="200" rx="10" fill="rgba(255,255,255,0.08)"/>
  <circle cx="330" cy="260" r="30" fill="rgba(255,255,255,0.15)"/>
  <text x="330" y="268" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">A</text>
  <rect x="160" y="380" width="200" height="14" rx="4" fill="rgba(255,255,255,0.2)"/>
