<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Video player frame -->
  <rect x="200" y="100" width="800" height="450" rx="20" fill="rgba(0,0,0,0.25)"/>
  <rect x="220" y="120" width="760" height="390" rx="12" fill="rgba(0,0,0,0.2)"/>
  <!-- Play button -->
  <circle cx="600" cy="315" r="60" fill="rgba(255,255,255,0.2)"/>
  <circle cx="600" cy="315" r="48" fill="rgba(255,255,255,0.15)"/>
  <polygon points="585,290 585,340 625,315" fill="rgba(255,255,255,0.7)"/>
  <!-- Timeline bar -->
  <rect x="260" y="470" width="680" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="260" y="470" width="300" height="8" rx="4" fill="rgba(255,255,255,0.4)"/>
  <circle cx="560" cy="474" r="8" fill="white" opacity="0.8"/>
  <!-- AI sparkles -->
  <circle cx="340" cy="200" r="4" fill="white" opacity="0.6"/>
  <circle cx="860" cy="180" r="3" fill="white" opacity="0.5"/>
  <circle cx="780" cy="250" r="5" fill="white" opacity="0.4"/>
  <circle cx="420" cy="400" r="3" fill="white" opacity="0.5"/>
  <circle cx="900" cy="350" r="4" fill="white" opacity="0.3"/>
  <text x="600" y="60" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">AI MARKETING LAB</text>
</svg>
