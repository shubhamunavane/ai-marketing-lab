<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Chat window -->
  <rect x="200" y="100" width="800" height="440" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="200" y="100" width="800" height="48" rx="16" fill="rgba(255,255,255,0.08)"/>
  <circle cx="230" cy="124" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="252" cy="124" r="6" fill="#eab308" opacity="0.6"/>
  <circle cx="274" cy="124" r="6" fill="#22c55e" opacity="0.6"/>
  <rect x="500" y="116" width="200" height="16" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- User message -->
  <rect x="500" y="180" width="460" height="60" rx="12" fill="rgba(129,140,248,0.2)"/>
  <rect x="520" y="198" width="300" height="10" rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="520" y="216" width="200" height="10" rx="3" fill="rgba(255,255,255,0.15)"/>
  <!-- AI response -->
  <rect x="240" y="270" width="500" height="100" rx="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="260" y="288" width="350" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="260" y="308" width="420" height="10" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="260" y="328" width="280" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="260" y="348" width="380" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>
  <!-- Chart in response -->
  <rect x="240" y="390" width="500" height="80" rx="12" fill="rgba(255,255,255,0.06)"/>
  <rect x="270" y="440" width="30" height="20" rx="2" fill="#818cf8" opacity="0.5"/>
  <rect x="310" y="425" width="30" height="35" rx="2" fill="#818cf8" opacity="0.6"/>
  <rect x="350" y="415" width="30" height="45" rx="2" fill="#818cf8" opacity="0.7"/>
  <rect x="390" y="420" width="30" height="40" rx="2" fill="#818cf8" opacity="0.6"/>
  <rect x="430" y="408" width="30" height="52" rx="2" fill="#34d399" opacity="0.7"/>
  <rect x="470" y="400" width="30" height="60" rx="2" fill="#34d399" opacity="0.8"/>
  <!-- Input area -->
  <rect x="220" y="490" width="740" height="40" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="240" y="504" width="200" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
  <text x="600" y="60" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">AI MARKETING LAB</text>
</svg>
