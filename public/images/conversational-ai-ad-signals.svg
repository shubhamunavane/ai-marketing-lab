<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08081a"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C8CFF;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7C8CFF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Radial glow behind center -->
  <ellipse cx="600" cy="315" rx="280" ry="220" fill="url(#glow)"/>

  <!-- Concentric signal rings -->
  <circle cx="600" cy="315" r="60"  fill="none" stroke="rgba(124,140,255,0.30)" stroke-width="1"/>
  <circle cx="600" cy="315" r="120" fill="none" stroke="rgba(124,140,255,0.18)" stroke-width="1"/>
  <circle cx="600" cy="315" r="190" fill="none" stroke="rgba(124,140,255,0.10)" stroke-width="1"/>
  <circle cx="600" cy="315" r="270" fill="none" stroke="rgba(124,140,255,0.06)" stroke-width="1"/>

  <!-- Center node -->
  <circle cx="600" cy="315" r="36" fill="rgba(124,140,255,0.15)" stroke="rgba(124,140,255,0.4)" stroke-width="1.5"/>
  <text x="600" y="320" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">AI Ads?</text>

  <!-- Signal dots on rings — some solid, some hollow (confirmed vs unconfirmed) -->
  <!-- Ring 1: strong signal -->
  <circle cx="600" cy="255" r="6" fill="rgba(124,140,255,0.7)"/>
  <circle cx="648" cy="338" r="6" fill="rgba(124,140,255,0.7)"/>
  <!-- Ring 2: medium signal -->
  <circle cx="503" cy="258" r="5" fill="rgba(124,140,255,0.35)"/>
  <circle cx="714" cy="370" r="5" fill="rgba(124,140,255,0.35)"/>
  <circle cx="580" cy="435" r="5" fill="rgba(124,140,255,0.35)"/>
  <!-- Ring 3: faint signal (unconfirmed) -->
  <circle cx="430" cy="315" r="4" fill="none" stroke="rgba(124,140,255,0.3)" stroke-width="1.5"/>
  <circle cx="770" cy="285" r="4" fill="none" stroke="rgba(124,140,255,0.3)" stroke-width="1.5"/>
  <circle cx="640" cy="505" r="4" fill="none" stroke="rgba(124,140,255,0.3)" stroke-width="1.5"/>
  <circle cx="555" cy="130" r="4" fill="none" stroke="rgba(124,140,255,0.25)" stroke-width="1.5"/>

  <!-- Labels for key nodes -->
  <text x="600" y="242" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="middle">Early tests</text>
  <text x="670" y="332" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)" text-anchor="start">Commerce signals</text>
  <text x="380" y="313" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="end">Attribution gap</text>
  <text x="780" y="283" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.25)" text-anchor="start">Brand safety?</text>
  <text x="560" y="520" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">Pricing unclear</text>

  <!-- Gemini contrast note — bottom right -->
  <rect x="870" y="430" width="220" height="60" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="980" y="456" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.3)" text-anchor="middle">Google / Gemini</text>
  <text x="980" y="474" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">Avoiding ads → trust play</text>

  <!-- Watermark -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.18)" text-anchor="middle" letter-spacing="2">AI MARKET LAB</text>
</svg>
