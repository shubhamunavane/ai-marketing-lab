<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Phone frame -->
  <rect x="460" y="60" width="280" height="510" rx="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <rect x="470" y="80" width="260" height="470" rx="20" fill="rgba(255,255,255,0.05)"/>
  <!-- Video content area -->
  <rect x="480" y="90" width="240" height="380" rx="12" fill="rgba(255,255,255,0.08)"/>
  <!-- Play/content indicators -->
  <circle cx="600" cy="280" r="30" fill="rgba(255,255,255,0.1)"/>
  <polygon points="592,265 592,295 616,280" fill="rgba(255,255,255,0.4)"/>
  <!-- Bottom UI elements -->
  <rect x="490" y="490" width="60" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="560" y="490" width="60" height="8" rx="4" fill="#ff0050" opacity="0.6"/>
  <rect x="630" y="490" width="60" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Sidebar icons -->
  <circle cx="690" cy="300" r="16" fill="rgba(255,255,255,0.1)"/>
  <circle cx="690" cy="345" r="16" fill="rgba(255,255,255,0.1)"/>
  <circle cx="690" cy="390" r="16" fill="rgba(255,255,255,0.1)"/>
  <!-- AI sparkle effects -->
  <circle cx="200" cy="200" r="60" fill="none" stroke="#25f4ee" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="#25f4ee" stroke-width="1" opacity="0.2"/>
  <circle cx="1000" cy="400" r="60" fill="none" stroke="#fe2c55" stroke-width="1" opacity="0.3"/>
  <circle cx="1000" cy="400" r="40" fill="none" stroke="#fe2c55" stroke-width="1" opacity="0.2"/>
  <!-- Connection lines -->
  <line x1="260" y1="200" x2="460" y2="280" stroke="#25f4ee" stroke-width="1" opacity="0.2"/>
  <line x1="740" y1="300" x2="940" y2="400" stroke="#fe2c55" stroke-width="1" opacity="0.2"/>
  <text x="600" y="40" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">AI MARKETING LAB</text>
</svg>
